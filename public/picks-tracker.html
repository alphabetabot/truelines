<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vega's Pick Tracker — TrueOddsIQ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 5px;
        }
        .header h1 span {
            color: #f59e0b;
        }
        .header p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: white;
        }
        .stat-card .label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 900;
        }
        .stat-card .units {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }
        .stat-card.positive .value {
            color: #22c55e;
        }
        .stat-card.negative .value {
            color: #ef4444;
        }
        .picks-list {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
        }
        .pick-item {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }
        .pick-item:last-child {
            border-bottom: none;
        }
        .pick-info {
            flex: 1;
        }
        .pick-date {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .pick-text {
            font-weight: 600;
            font-size: 14px;
            color: white;
            margin-bottom: 4px;
        }
        .pick-game {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        .pick-result {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .result-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
        }
        .result-w {
            background: rgba(34,197,94,0.2);
            color: #22c55e;
        }
        .result-l {
            background: rgba(239,68,68,0.2);
            color: #ef4444;
        }
        .units-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 12px;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .sport-tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            margin-right: 8px;
            text-transform: uppercase;
        }
        .sport-mlb {
            background: rgba(34,197,94,0.2);
            color: #22c55e;
        }
        .sport-nba {
            background: rgba(37,99,235,0.2);
            color: #2563eb;
        }
        .sport-nhl {
            background: rgba(99,102,241,0.2);
            color: #6366f1;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Vega's Pick <span>Tracker</span></h1>
            <p>Live record · Updated daily</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card positive">
                <div class="label">Record</div>
                <div class="value" id="record">11-2</div>
                <div class="units">Total picks</div>
            </div>
            <div class="stat-card positive">
                <div class="label">Win Rate</div>
                <div class="value" id="winrate">85%</div>
                <div class="units">13 picks</div>
            </div>
            <div class="stat-card positive">
                <div class="label">Units</div>
                <div class="value" id="units">+5.78u</div>
                <div class="units">Profit</div>
            </div>
        </div>

        <div class="picks-list">
            <div id="picks-container"></div>
        </div>

        <div class="footer">
            All picks tracked from publication date · Past results do not guarantee future performance
        </div>
    </div>

    <script>
        const PICKS = [
            { date: 'Apr 24', sport: 'NBA', game: 'Thunder vs Suns', pick: 'OKC -470', result: 'W', units: 0.21 },
            { date: 'Apr 24', sport: 'MLB', game: 'Red Sox vs Orioles', pick: 'Boston -1.5', result: 'W', units: 0.80 },
            { date: 'Apr 24', sport: 'NBA', game: 'Spurs vs Blazers', pick: 'San Antonio -142', result: 'W', units: 0.70 },
            { date: 'Apr 25', sport: 'NBA', game: 'Celtics vs 76ers', pick: 'Boston -290', result: 'W', units: 0.34 },
            { date: 'Apr 25', sport: 'MLB', game: 'Yankees vs Astros', pick: 'NY -1.5 RL', result: 'W', units: 1.15 },
            { date: 'Apr 25', sport: 'NBA', game: 'Spurs vs Blazers', pick: 'San Antonio -218', result: 'W', units: 0.46 },
            { date: 'Apr 26', sport: 'NBA', game: 'Thunder vs Suns', pick: 'OKC -500', result: 'W', units: 0.20 },
            { date: 'Apr 26', sport: 'NHL', game: 'Wild vs Stars', pick: 'Minnesota +114', result: 'W', units: 1.14 },
            { date: 'Apr 26', sport: 'MLB', game: 'Red Sox vs Blue Jays', pick: 'Under 8.5', result: 'W', units: 0.91 },
            { date: 'Apr 27', sport: 'NBA', game: 'Celtics vs 76ers', pick: 'Boston -550', result: 'W', units: 0.18 },
            { date: 'Apr 27', sport: 'MLB', game: 'Astros vs Orioles', pick: 'Houston ML', result: 'W', units: 0.69 },
            { date: 'Apr 27', sport: 'NBA', game: 'Blazers vs Spurs', pick: 'Portland +440', result: 'L', units: -1.00 },
            { date: 'Apr 29', sport: 'MLB', game: 'Red Sox vs Rays', pick: 'Boston RL -1.5', result: 'L', units: -1.00 },
            { date: 'Apr 29', sport: 'MLB', game: 'Red Sox vs Rays', pick: 'Under 8.5', result: 'L', units: -1.00 },
        ];

        const wins = PICKS.filter(p => p.result === 'W').length;
        const losses = PICKS.filter(p => p.result === 'L').length;
        const total = wins + losses;
        const winrate = total > 0 ? Math.round((wins / total) * 100) : 0;
        const totalUnits = PICKS.reduce((sum, p) => sum + p.units, 0);

        document.getElementById('record').textContent = `${wins}-${losses}`;
        document.getElementById('winrate').textContent = `${winrate}%`;
        document.getElementById('units').textContent = `${totalUnits > 0 ? '+' : ''}${totalUnits.toFixed(2)}u`;

        const sportClass = {
            'MLB': 'sport-mlb',
            'NBA': 'sport-nba',
            'NHL': 'sport-nhl'
        };

        const container = document.getElementById('picks-container');
        PICKS.reverse().forEach(pick => {
            const item = document.createElement('div');
            item.className = 'pick-item';
            item.innerHTML = `
                <div class="pick-info">
                    <div class="pick-date">${pick.date}</div>
                    <div class="pick-text">
                        <span class="sport-tag ${sportClass[pick.sport]}">${pick.sport}</span>
                        ${pick.pick}
                    </div>
                    <div class="pick-game">${pick.game}</div>
                </div>
                <div class="pick-result">
                    <span class="result-badge result-${pick.result}">${pick.result}</span>
                    <span class="units-badge">${pick.units > 0 ? '+' : ''}${pick.units.toFixed(2)}u</span>
                </div>
            `;
            container.appendChild(item);
        });
    </script>
</body>
</html>
